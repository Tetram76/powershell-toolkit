name: CI PowerShell

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  psscriptanalyzer:
    name: PSScriptAnalyzer
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue | Out-Null
          Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

          $settingsPath = Join-Path $env:GITHUB_WORKSPACE '.PSScriptAnalyzerSettings.psd1'
          $invokeParams = @{}
          if (Test-Path -LiteralPath $settingsPath) {
            $invokeParams.Settings = $settingsPath
          }

          $scripts = @(Get-ChildItem -LiteralPath $env:GITHUB_WORKSPACE -Recurse -File |
            Where-Object {
              $_.Extension -in @('.ps1', '.psm1', '.psd1') -and
              $_.FullName -notmatch '(?i)[\\/]\.git[\\/]'
            })

          if ($scripts.Count -eq 0) {
            Write-Warning 'No .ps1, .psm1, or .psd1 files found under the repository root.'
            exit 0
          }

          $issues = foreach ($script in $scripts) {
            Invoke-ScriptAnalyzer -Path $script.FullName @invokeParams
          }

          $failures = @($issues | Where-Object { $_.Severity -in @('ParseError', 'Error') })

          if ($failures.Count -gt 0) {
            $failures | Sort-Object Severity, RuleName, ScriptPath, Line | Format-Table -AutoSize RuleName, Severity, ScriptPath, Line, Message | Out-Host
            Write-Host ("##[error]PSScriptAnalyzer reported {0} failing diagnostic(s) (ParseError or Error)." -f $failures.Count)
            exit 1
          }

          Write-Host ('Analyzed {0} file(s); ParseError/Error count: {1}.' -f $scripts.Count, $failures.Count)
          exit 0

  pester:
    name: Pester
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Set-PSRepository -Name PSGallery -InstallationPolicy Trusted -ErrorAction SilentlyContinue | Out-Null
          Install-Module Pester -RequiredVersion 5.7.1 -Scope CurrentUser -Force -SkipPublisherCheck

      - name: Run Pester
        shell: pwsh
        run: |
          Set-StrictMode -Version Latest
          $ErrorActionPreference = 'Stop'
          Push-Location $env:GITHUB_WORKSPACE
          try {
            & "$env:GITHUB_WORKSPACE/build/Invoke-Tests.ps1" -Coverage
          }
          finally {
            Pop-Location
          }

      - name: Upload test results (NUnit)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-test-results
          path: TestResults.xml

      - name: Upload code coverage (JaCoCo)
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: pester-coverage
          path: coverage.xml
